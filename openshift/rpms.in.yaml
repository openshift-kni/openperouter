contentOrigin:
  repos:
    - repoid: rhel-10-for-x86_64-baseos-rpms
      name: Red Hat Enterprise Linux 10 for x86_64 - BaseOS (RPMs)
      baseurl: https://cdn.redhat.com/content/dist/rhel10/$releasever/x86_64/baseos/os
      enabled: 1
      gpgcheck: 1
      gpgkey: file:///etc/pki/rpm-gpg/RPM-GPG-KEY-redhat-release
    - repoid: rhel-10-for-x86_64-appstream-rpms
      name:  Red Hat Enterprise Linux 10 for x86_64 - AppStream (RPMs)
      baseurl: https://cdn.redhat.com/content/dist/rhel10/$releasever/x86_64/appstream/os
      enabled: 1
      gpgcheck: 1
      gpgkey: file:///etc/pki/rpm-gpg/RPM-GPG-KEY-redhat-release
    - repoid: "copr:copr.fedorainfracloud.org:mruprich:FRR10"
      name: Copr repo for FRR10 owned by mruprich
      baseurl: https://download.copr.fedorainfracloud.org/results/mruprich/FRR10/epel-10-$basearch/
      enabled: 1
      gpgcheck: 1
      gpgkey: https://download.copr.fedorainfracloud.org/results/mruprich/FRR10/pubkey.gpg

arches:
  - x86_64

packages:
  # runtime deps (installed into staging)
  - name: glibc-minimal-langpack
  - name: coreutils-single
  - name: less
  - name: tcpdump
  - name: frr
  # build deps
  - name: git
  - name: gcc
  - name: make
  - name: meson
  - name: ninja-build
  - name: pkgconf
  - name: python3-pyelftools
  - name: libedit-devel
  - name: libevent-devel
  - name: libmnl-devel
  - name: rdma-core-devel
  - name: patch
  - name: libarchive-devel
  - name: rpm-build
  - name: numactl-devel
